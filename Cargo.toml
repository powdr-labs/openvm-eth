openvm-bigint-transpiler = { git = "https://github.com/powdr-labs/openvm.git", branch = "v2-powdr-beta.2" }
openvm-build = { git = "https://github.com/powdr-labs/openvm.git", branch = "v2-powdr-beta.2" }
