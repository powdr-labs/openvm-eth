openvm-continuations = { git = "https://github.com/powdr-labs/openvm.git", branch = "v2-powdr-beta.2" }
openvm-ecc-circuit = { git = "https://github.com/powdr-labs/openvm.git", branch = "v2-powdr-beta.2" }
openvm-ecc-guest = { git = "https://github.com/powdr-labs/openvm.git", branch = "v2-powdr-beta.2" }
