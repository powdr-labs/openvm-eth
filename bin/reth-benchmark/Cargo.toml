[package]
name = "openvm-reth-benchmark"
edition.workspace = true
repository.workspace = true
homepage.workspace = true
exclude.workspace = true
version.workspace = true

[lib]
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
url.workspace = true
tracing-subscriber.workspace = true
tracing.workspace = true
dotenv = "0.15.0"
clap = { version = "4.5.7", features = ["derive", "env"] }
clap_builder = "4.5.34"
bincode = { workspace = true, features = ["std"] }
bitcode.workspace = true
hex = "0.4.3"
serde_json.workspace = true
eyre.workspace = true
tokio.workspace = true
zstd.workspace = true
toml.workspace = true

# workspace
openvm-stateless-executor.workspace = true
openvm-rpc-proxy.workspace = true

# alloy
alloy-primitives.workspace = true
alloy-provider.workspace = true
alloy-rpc-client.workspace = true
alloy-transport.workspace = true

# reth
reth-primitives.workspace = true

# Note: the openvm-sdk commit does not need to be exactly the same as the `openvm` commit used in the guest program: as long as
# the openvm-sdk commit doesn't change any guest libraries, they are compatible
# This allows us to not update revm and openvm-kzg each time we change openvm-sdk
openvm-stark-sdk = { git = "https://github.com/openvm-org/stark-backend.git", branch = "develop-v2", default-features = false }
openvm-cuda-backend = { git = "https://github.com/openvm-org/stark-backend.git", branch = "develop-v2", default-features = false, optional = true }
openvm-transpiler = { git = "https://github.com/openvm-org/openvm.git", branch = "develop-v2.0.0-beta", default-features = false }
# TODO: temporary so we don't need to change workspace openvm commit
openvm-v2 = { git = "https://github.com/openvm-org/openvm.git", branch = "develop-v2.0.0-beta", package = "openvm", default-features = false }
openvm-circuit = { git = "https://github.com/openvm-org/openvm.git", branch = "develop-v2.0.0-beta", default-features = false }
verify-stark = { git = "https://github.com/openvm-org/openvm.git", branch = "develop-v2.0.0-beta", default-features = false }
sdk-v2 = { git = "https://github.com/openvm-org/openvm.git", branch = "develop-v2.0.0-beta", default-features = false }
openvm-sdk-config = { git = "https://github.com/openvm-org/openvm.git", branch = "develop-v2.0.0-beta", default-features = false }

# halo2
halo2-axiom = { version = "0.5.0", default-features = false, optional = true }

[package.metadata.cargo-machete]
ignored = ["halo2-axiom"]

[features]
default = ["parallel", "jemalloc", "metrics"]
parallel = ["sdk-v2/parallel"]
metrics = ["sdk-v2/metrics"]
tco = ["sdk-v2/tco"]
aot = ["sdk-v2/aot"]
# evm-prove = ["sdk-v2/evm-prove", "halo2-axiom"]
# evm-verify = ["evm-prove", "sdk-v2/evm-verify", "halo2-axiom"]
perf-metrics = ["sdk-v2/perf-metrics"]
mimalloc = ["sdk-v2/mimalloc"]
jemalloc = ["sdk-v2/jemalloc"]
# x86 only:
halo2-asm = ["halo2-axiom?/asm"]
cuda = ["dep:openvm-cuda-backend", "sdk-v2/cuda"]
unprotected = ["sdk-v2/unprotected"]
