name: "Reth Benchmark"
run-name: "Reth Benchmark (block ${{ inputs.block_number || github.event.inputs.block_number }})"

on:
  workflow_dispatch:
    # github workflow dispatch inputs has 10 input limit...
    # > you may only define up to 10 `inputs` for a `workflow_dispatch` event
    inputs:
      instance_family:
        type: string
        required: false
        description: The family of the instance, can be multiple ones concat with "+" e.g. g6+g5
        default: g6e.2xlarge
      block_number:
        type: number
        required: false
        description: Block number to run the benchmark on
        default: 23992138
      # app_log_blowup:
      #   type: number
      #   required: false
      #   description: Application level log blowup
      #   default: 1
      leaf_log_blowup:
        type: number
        required: false
        description: Aggregation (leaf) level log blowup
      internal_log_blowup:
        type: number
        required: false
        description: Internal level log blowup
      # root_log_blowup:
      #   type: number
      #   required: false
      #   description: Root level log blowup (only for e2e)
      #   default: 3
      mode:
        type: choice
        required: false
        description: Running mode
        options:
          - execute
          - execute-metered
          - prove-app
          - prove-stark
          - prove-evm
        default: prove-stark
      profiling:
        type: choice
        required: false
        description: Profiling mode
        options:
          - none
          # - host # host profiling (samply, flamegraphs, etc)
          # - guest # guest profiling (circuit flamegraphs)
          - nsys # nsys profiling (cuda)
        default: none
      max_segment_length:
        type: number
        required: false
        description: Max segment length for continuations
        default: 4194304 # 2**22, but the main criteria should be segment_max_memory
      segment_max_memory:
        type: string
        required: false
        description: GPU memory soft limit for segmentation
        default: "16106127360" # 15gb
      app_l_skip:
        type: number
        required: false
        description: Log of univariate skip domain size
        default: 4
      # num_children_leaf:
      #   type: number
      #   required: false
      #   description: Number of app proofs that leaf verifier aggregates
      #   default: 1
      # num_children_internal:
      #   type: number
      #   required: false
      #   description: Number of proofs that internal verifier aggregates
      #   default: 3
  workflow_call:
    inputs:
      ref:
        type: string
        required: false
        description: Git ref to checkout
      instance_family:
        type: string
        required: false
        description: The family of the instance, can be multiple ones concat with "+" e.g. g6+g5
        default: g6e.2xlarge
      memory_allocator:
        type: string
        required: false
        description: Memory allocator to use (mimalloc or jemalloc)
        default: jemalloc
      block_number:
        type: number
        required: false
        description: Block number to run the benchmark on
        default: 23992138
      # app_log_blowup:
      #   type: number
      #   required: false
      #   description: Application level log blowup
      #   default: 1
      leaf_log_blowup:
        type: number
        required: false
        description: Aggregation (leaf) level log blowup
      internal_log_blowup:
        type: number
        required: false
        description: Internal level log blowup (only for e2e)
      # root_log_blowup:
      #   type: number
      #   required: false
      #   description: Root level log blowup (only for e2e)
      #   default: 3
      mode:
        type: string
        required: false
        description: Running mode, one of {execute, execute-metered, prove-app, prove-stark, prove-evm}
        default: prove-stark
      profiling:
        type: string
        required: false
        description: Profiling mode (none, host, guest, nsys)
        default: none
      max_segment_length:
        type: number
        required: false
        description: Max segment length for continuations
        default: 4194304 # 2**22, but the main criteria should be segment_max_memory
      segment_max_memory:
        type: string
        required: false
        default: "16106127360"
      app_l_skip:
        type: number
        required: false
        description: Log of univariate skip domain size
        default: 4
      # num_children_leaf:
      #   type: number
      #   required: false
      #   description: Number of app proofs that leaf verifier aggregates
      #   default: 1
      # num_children_internal:
      #   type: number
      #   required: false
      #   description: Number of proofs that internal verifier aggregates
      #   default: 3
      tag:
        type: string
        required: false
        description: Tag for cache keys (default is commit hash)
    secrets:
      GH_ACTIONS_DEPLOY_PRIVATE_KEY:
        required: true
      RPC_URL_1:
        required: true
    outputs:
      metric_name:
        description: "Name of the metric"
        value: ${{ jobs.run-reth.outputs.metric_name }}
      gpu_peak_memory_mib:
        description: "Peak GPU memory usage in MiB"
        value: ${{ jobs.run-reth.outputs.gpu_peak_memory_mib }}
      num_segments:
        description: "Number of segments"
        value: ${{ jobs.run-reth.outputs.num_segments }}

env:
  S3_MD_PATH: s3://${{ vars.S3_WORKFLOW_DATA_BUCKET }}/benchmark/github/results
  S3_FIXTURE_PATH: s3://${{ vars.S3_PUBLIC_DATA_BUCKET }}/benchmark/github/fixtures
  S3_METRICS_PATH: s3://${{ vars.S3_WORKFLOW_DATA_BUCKET }}/benchmark/github/metrics
  S3_PUBLIC_PATH_BASE: s3://${{ vars.S3_PUBLIC_DATA_BUCKET }}/benchmark/github
  S3_PUBLIC_URL_BASE: https://${{ vars.S3_PUBLIC_DATA_BUCKET }}.s3.${{ vars.S3_REGION }}.amazonaws.com/benchmark/github
  S3_SAMPLY_PROFILE_PATH: s3://${{ vars.S3_PUBLIC_DATA_BUCKET }}/benchmark/github/samply
  CMD_ARGS: ""
  INPUT_ARGS: ""
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  BIN_NAME: openvm-reth-benchmark

jobs:
  run-reth:
    name: Run Reth benchmark
    runs-on:
      - runs-on=${{ github.run_id }}/family=${{ inputs.instance_family || github.event.inputs.instance_family }}/disk=large/tag=bench-reth-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}/extras=s3-cache/spot=false/image=${{ startsWith(github.event.inputs.instance_family || inputs.instance_family, 'g') && 'ubuntu24-gpu-x64' || contains(github.event.inputs.instance_family || inputs.instance_family, 'g.') && 'ubuntu24-full-arm64' || 'ubuntu24-full-x64' }}
    outputs:
      metric_name: ${{ steps.set-metric-name.outputs.name }}
      gpu_memory_svg_url: ${{ steps.set-metric-name.outputs.memory_svg_url }}
      gpu_peak_memory_mib: ${{ steps.report-gpu-memory.outputs.peak_memory_mib }}
      num_segments: ${{ steps.report-segments.outputs.num_segments }}
    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.head_ref || github.ref }}
      - uses: dtolnay/rust-toolchain@nightly
        env:
          RUSTUP_PERMIT_COPY_RENAME: "1"
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Add workflow inputs to summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Workflow Inputs" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo '${{ toJSON(inputs || github.event.inputs) }}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Display workflow inputs
        run: |
          if [[ "${{ inputs.manual_call }}" == "true" ]]; then
            echo "${{ toJSON(inputs) }}"
          else
            echo "${{ toJSON(github.event.inputs) }}"
          fi

      - name: Get current commit hash
        run: |
          echo "current_sha=$(git rev-parse HEAD)" >> $GITHUB_ENV
          # for add_metadata function
          echo "CURRENT_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Set metric name
        id: set-metric-name
        run: |
          input_json_str="${{ toJSON(inputs || github.event.inputs) }}"
          input_hash=$(echo $input_json_str | sha256sum | cut -d' ' -f1)
          METRIC_NAME=reth-$current_sha-${input_hash}-${{ github.run_id }}
          echo "METRIC_NAME=${METRIC_NAME}" >> $GITHUB_ENV
          METRIC_PATH=".bench_metrics/${METRIC_NAME}.json"
          echo "METRIC_PATH=${METRIC_PATH}" >> $GITHUB_ENV
          echo "name=${METRIC_NAME}" >> $GITHUB_OUTPUT
          # depends on add_metadata util function and openvm-prof file naming
          GPU_MEMORY_SVG_URL="${S3_PUBLIC_URL_BASE}/charts/${CURRENT_SHA}/${METRIC_NAME}.memory.svg"
          echo "memory_svg_url=${GPU_MEMORY_SVG_URL}" >> $GITHUB_OUTPUT
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GH_ACTIONS_DEPLOY_PRIVATE_KEY }}
      # needed only for patching
      - name: Ensure GitHub.com is a known host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Checkout openvm (for scripts)
        run: git clone --depth=1 --branch="develop-v2.0.0-rc.1" https://github.com/openvm-org/openvm.git
      - name: Build openvm-prof
        working-directory: openvm
        run: |
          cargo build -p openvm-prof
          echo "${{ github.workspace }}/openvm/target/debug" >> $GITHUB_PATH
      - name: Install architecture specific tools
        run: |
          source openvm/ci/scripts/utils.sh
          install_s5cmd
          sudo apt update && sudo apt install -y gnuplot

      - name: Setup halo2 KZG params
        if: ${{ (github.event.inputs.mode == 'prove-evm') || (inputs.mode == 'prove-evm') }}
        run: bash ./ci/trusted_setup_s3.sh

      - name: Install solc
        if: ${{ (github.event.inputs.mode == 'prove-evm') || (inputs.mode == 'prove-evm') }}
        run: (hash svm 2>/dev/null || cargo install --locked --version 0.5.24 svm-rs) && svm install 0.8.19 && solc --version

      - name: Set build profiles
        id: set-build-profiles
        run: |
          GUEST_PROFILE="release"
          HOST_PROFILE="maxperf"
          echo "guest_profile=${GUEST_PROFILE}" >> $GITHUB_OUTPUT
          echo "host_profile=${HOST_PROFILE}" >> $GITHUB_OUTPUT
      - name: Set build args
        id: set-build-args
        run: |
          FEATURES="parallel,metrics,unprotected"
          FEATURES="${FEATURES},${{ inputs.memory_allocator || github.event.inputs.memory_allocator || 'jemalloc' }}"
          if [[ "${{ inputs.instance_family || github.event.inputs.instance_family }}" =~ ^g ]]; then
            FEATURES="${FEATURES},cuda"
          fi

          MODE="${{ inputs.mode || github.event.inputs.mode }}"
          if [[ "$MODE" == "prove-evm" ]]; then
            FEATURES="${FEATURES},evm-verify"
          fi

          arch=$(uname -m)
          case $arch in
            arm64|aarch64)
              RUSTFLAGS="-Ctarget-cpu=native"
              ;;
            x86_64|amd64)
              RUSTFLAGS="-Ctarget-cpu=native"
              # aot enables halo2curves-axiom/asm which is x86_64-only
              FEATURES="${FEATURES},aot"
              ;;
            *)
              echo "Unsupported architecture: $arch"
              exit 1
              ;;
          esac

          if [[ "${{ inputs.profiling || github.event.inputs.profiling }}" != "nsys" ]]; then
            # Jemalloc sometimes causes nsys to hang forever (unknown reason)
            JEMALLOC_SYS_WITH_MALLOC_CONF="retain:true,background_thread:true,metadata_thp:always,thp:always,dirty_decay_ms:10000,muzzy_decay_ms:10000,abort_conf:true"
            echo "JEMALLOC_SYS_WITH_MALLOC_CONF=${JEMALLOC_SYS_WITH_MALLOC_CONF}" >> $GITHUB_ENV
          fi
          echo "FEATURES=${FEATURES}" >> $GITHUB_ENV

      - name: Set cache keys
        id: set-cache-keys
        run: |
          arch=$(uname -m)
          # Use inputs.tag if defined, otherwise use current commit SHA
          # Use inputs.tag if defined, otherwise use current commit SHA
          TAG="${{ inputs.tag || env.current_sha }}"
          GUEST_PROFILE=${{ steps.set-build-profiles.outputs.guest_profile }}
          echo "elf_cache_key=elf-${TAG}-${arch}-${GUEST_PROFILE}" >> $GITHUB_OUTPUT
          RUSTFLAGS_HASH=$(echo "${RUSTFLAGS}" | sha256sum | cut -d' ' -f1 | head -c8)
          JEMALLOC_CONF_HASH=$(echo "${JEMALLOC_SYS_WITH_MALLOC_CONF}" | sha256sum | cut -d' ' -f1 | head -c8)
          FEATURES_HASH=$(echo "${FEATURES}" | sha256sum | cut -d' ' -f1 | head -c8)
          HOST_PROFILE=${{ steps.set-build-profiles.outputs.host_profile }}
          echo "host_cache_key=host-${TAG}-${arch}-${HOST_PROFILE}-${RUSTFLAGS_HASH}-${JEMALLOC_CONF_HASH}-${FEATURES_HASH}" >> $GITHUB_OUTPUT

      - name: Restore Guest ELF from cache
        id: cache-guest-elf-restore
        uses: runs-on/cache/restore@v4
        with:
          path: bin/reth-benchmark/elf/openvm-stateless-guest
          key: ${{ steps.set-cache-keys.outputs.elf_cache_key }}

      - name: Build cargo-openvm
        if: steps.cache-guest-elf-restore.outputs.cache-hit != 'true'
        working-directory: openvm
        run: |
          cargo build --locked -p cargo-openvm
          echo "${{ github.workspace }}/openvm/target/debug" >> $GITHUB_PATH
      - name: Build Guest ELF
        if: steps.cache-guest-elf-restore.outputs.cache-hit != 'true'
        working-directory: bin/stateless-guest
        run: |
          GUEST_PROFILE=${{ steps.set-build-profiles.outputs.guest_profile }}
          RUSTFLAGS="" cargo openvm build --no-transpile --profile=$GUEST_PROFILE
          mkdir -p ../reth-benchmark/elf
          cp target/riscv32im-risc0-zkvm-elf/$GUEST_PROFILE/openvm-stateless-guest ../reth-benchmark/elf/

      - name: Save Guest ELF to cache
        if: steps.cache-guest-elf-restore.outputs.cache-hit != 'true'
        uses: runs-on/cache/save@v4
        with:
          path: bin/reth-benchmark/elf/openvm-stateless-guest
          key: ${{ steps.cache-guest-elf-restore.outputs.cache-primary-key }}

      - name: Restore Host Binary from cache
        id: cache-host-binary-restore
        uses: runs-on/cache/restore@v4
        with:
          path: target/${{ steps.set-build-profiles.outputs.host_profile }}/${{ env.BIN_NAME }}
          key: ${{ steps.set-cache-keys.outputs.host_cache_key }}

      - name: Build Host Binary
        if: steps.cache-host-binary-restore.outputs.cache-hit != 'true'
        working-directory: bin/reth-benchmark
        run: |
          export JEMALLOC_SYS_WITH_MALLOC_CONF=${JEMALLOC_SYS_WITH_MALLOC_CONF}
          HOST_PROFILE=${{ steps.set-build-profiles.outputs.host_profile }}
          TOOLCHAIN="+nightly-2025-08-19"
          RUSTFLAGS=$RUSTFLAGS cargo $TOOLCHAIN build --bin ${{ env.BIN_NAME }} --profile=$HOST_PROFILE --no-default-features --features=$FEATURES

      - name: Save Host Binary to cache
        if: steps.cache-host-binary-restore.outputs.cache-hit != 'true'
        uses: runs-on/cache/save@v4
        with:
          path: target/${{ steps.set-build-profiles.outputs.host_profile }}/${{ env.BIN_NAME }}
          key: ${{ steps.cache-host-binary-restore.outputs.cache-primary-key }}

      - name: Set up run benchmark script
        run: |
          mkdir -p rpc-cache
          mkdir -p .bench_metrics
          RPC_1=${{ secrets.RPC_URL_1 }}
          MODE=${{ inputs.mode || github.event.inputs.mode }}
          BLOCK_NUMBER=${{ inputs.block_number || github.event.inputs.block_number }}
          HOST_PROFILE=${{ steps.set-build-profiles.outputs.host_profile }}
          LEAF_LOG_BLOWUP="${{ inputs.leaf_log_blowup || github.event.inputs.leaf_log_blowup }}"
          INTERNAL_LOG_BLOWUP="${{ inputs.internal_log_blowup || github.event.inputs.internal_log_blowup }}"
          if [[ -n $LEAF_LOG_BLOWUP ]]; then
            OPTIONAL_ARGS="$OPTIONAL_ARGS --leaf-log-blowup $LEAF_LOG_BLOWUP"
          fi
          if [[ -n $INTERNAL_LOG_BLOWUP ]]; then
            OPTIONAL_ARGS="$OPTIONAL_ARGS --internal-log-blowup $INTERNAL_LOG_BLOWUP"
          fi
          # TODO: make these configurable again when needed:
          # OPTIONAL_ARGS="$OPTIONAL_ARGS --app-log-blowup <value>"
          # OPTIONAL_ARGS="$OPTIONAL_ARGS --root-log-blowup <value>"
          # OPTIONAL_ARGS="$OPTIONAL_ARGS --num-children-leaf <value>"
          # OPTIONAL_ARGS="$OPTIONAL_ARGS --num-children-internal <value>"
          cat > run_benchmark.sh <<EOF
          #!/bin/bash
          /usr/bin/time -v ./target/$HOST_PROFILE/${{ env.BIN_NAME }} \
            --mode $MODE --block-number $BLOCK_NUMBER --rpc-url $RPC_1 --cache-dir rpc-cache \
            --max-segment-length ${{ inputs.max_segment_length || github.event.inputs.max_segment_length }} \
            --segment-max-memory ${{ inputs.segment_max_memory || github.event.inputs.segment_max_memory }} \
            --app-l-skip ${{ inputs.app_l_skip || github.event.inputs.app_l_skip || 4 }} \
            $OPTIONAL_ARGS
          EOF
          chmod +x run_benchmark.sh

      - name: Run benchmark
        id: run-benchmark
        run: |
          MAX_MEMORY=${{ inputs.segment_max_memory || github.event.inputs.segment_max_memory }}
          export VPMM_PAGE_SIZE=$((4<<20))
          export VPMM_PAGES=$((MAX_MEMORY / VPMM_PAGE_SIZE))
          export JEMALLOC_SYS_WITH_MALLOC_CONF=${JEMALLOC_SYS_WITH_MALLOC_CONF}
          export RUST_LOG="info,p3_=warn"
          export OUTPUT_PATH=${METRIC_PATH}

          # Source GPU monitoring utilities
          source "$GITHUB_WORKSPACE/scripts/gpu_monitor.sh"
          GPU_LOG_FILE="gpu_memory_usage.csv"

          if [[ "${{ inputs.profiling || github.event.inputs.profiling }}" == "nsys" ]]; then
            nsys profile --trace=cuda,osrt,nvtx \
             --cuda-memory-usage=true \
             --force-overwrite=true \
             -o reth.nsys-rep \
             ./run_benchmark.sh
            echo "=== CUDA GPU Kernel Summary ==="
            nsys stats --report cuda_gpu_kern_sum reth.nsys-rep
            echo "=== CUDA Memory Time Summary ==="
            nsys stats --report cuda_gpu_mem_time_sum reth.nsys-rep
            echo "=== CUDA Memory Size Summary ==="
            nsys stats --report cuda_gpu_mem_size_sum reth.nsys-rep
            echo "=== NCU Top Kernel Analysis ==="
            TOP_KERNEL=$(nsys stats --report cuda_gpu_kern_sum reth.nsys-rep 2>/dev/null | \
              awk '/--------/{getline; print; exit}' | \
              sed -E 's/.*::([a-zA-Z_][a-zA-Z0-9_]*)[<(].*/\1/; t; s/.*[[:space:]]([a-zA-Z_][a-zA-Z0-9_]*)[<(].*/\1/')
            echo "Top kernel: $TOP_KERNEL"

            if [[ -n "$TOP_KERNEL" ]]; then
              sudo env PATH=$PATH ncu --target-processes all \
                --kernel-name "$TOP_KERNEL" \
                -f -o reth.ncu-rep \
                --launch-skip 4 \
                --launch-count 1 \
                --set full \
                ./run_benchmark.sh
              echo "=== NCU Kernel Report ==="
              ncu -i reth.ncu-rep
            else
              echo "Warning: Could not extract top kernel name"
            fi
            # nsys has its own memory tracking, set peak to 0
            echo "GPU_PEAK_MEMORY_MIB=0" >> $GITHUB_ENV
          else
            # Start GPU memory monitoring
            start_gpu_monitor "$GPU_LOG_FILE" 5

            set -o pipefail
            ./ci/monitor_memory.sh ./run_benchmark.sh 2>&1 | tee benchmark_output.log

            # Finalize GPU monitoring and capture peak
            finalize_gpu_monitor
            echo "GPU_PEAK_MEMORY_MIB=${GPU_PEAK_MEMORY}" >> $GITHUB_ENV
            echo "GPU_LOG_FILE=${GPU_LOG_FILE}" >> $GITHUB_ENV

            echo "MEM_USAGE_PATH=memory_usage.png" >> $GITHUB_ENV
          fi


      - name: Report GPU peak memory
        id: report-gpu-memory
        run: |
          echo "peak_memory_mib=${GPU_PEAK_MEMORY_MIB}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### GPU Memory" >> $GITHUB_STEP_SUMMARY
          echo "Peak GPU memory usage: **$(awk "BEGIN{printf \"%.2f\",${GPU_PEAK_MEMORY_MIB}/1024}") GB**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Report segments
        id: report-segments
        run: |
          NUM_SEGMENTS=$(jq '[.gauge[] | .labels[] | select(.[0] == "segment") | .[1]] | unique | length' "${METRIC_PATH}" 2>/dev/null || echo "")
          echo "num_segments=${NUM_SEGMENTS}" >> $GITHUB_OUTPUT
          if [[ -n "${NUM_SEGMENTS}" && "${NUM_SEGMENTS}" -gt 0 ]]; then
            echo "### Segments" >> $GITHUB_STEP_SUMMARY
            echo "Number of segments: **${NUM_SEGMENTS}**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload memory usage graph
        if: ${{ (inputs.profiling || github.event.inputs.profiling) == 'none' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-metric-name.outputs.name }}-memory-usage
          path: |
            ${{ env.MEM_USAGE_PATH }}
            ${{ env.GPU_LOG_FILE }}
          retention-days: 1

      - name: Upload nsys report
        if: ${{ (inputs.profiling || github.event.inputs.profiling) == 'nsys' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-metric-name.outputs.name }}-nsys-report
          path: ./reth.nsys-rep
          retention-days: 1

      - name: Upload Benchmark Metrics
        run: s5cmd cp ${METRIC_PATH} ${{ env.S3_METRICS_PATH }}/${METRIC_NAME}.json

      - name: Generate markdown
        run: |
          openvm-prof --json-paths $METRIC_PATH --num-devices 16 --proofs-per-device 1
          MD_PATH=${METRIC_PATH%.json}.md
          echo "MD_PATH=${MD_PATH}" >> $GITHUB_ENV

      - name: Add benchmark metadata to markdown
        run: |
          COMMIT_URL=https://github.com/${{ github.repository }}/commit/${current_sha}
          BENCHMARK_WORKFLOW_URL=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

          source openvm/ci/scripts/utils.sh

          add_metadata $MD_PATH \
            ${{ inputs.max_segment_length || github.event.inputs.max_segment_length }} \
            ${{ inputs.instance_family || github.event.inputs.instance_family }} \
            ${{ inputs.memory_allocator || github.event.inputs.memory_allocator || 'jemalloc' }} \
            $COMMIT_URL \
            $BENCHMARK_WORKFLOW_URL

          # Add GPU peak memory to the markdown if available
          if [[ -n "${GPU_PEAK_MEMORY_MIB}" && "${GPU_PEAK_MEMORY_MIB}" != "0" ]]; then
            echo "" >> $MD_PATH
            echo "**Peak GPU Memory (nvidia-smi):** $(awk "BEGIN{printf \"%.2f\",${GPU_PEAK_MEMORY_MIB}/1024}") GB" >> $MD_PATH
          fi

      - name: Upload markdown
        run: |
          S3_MD_PATH="${{ env.S3_MD_PATH }}/${METRIC_NAME}.md"
          s5cmd cp $MD_PATH $S3_MD_PATH

          DETAILED_MD_PATH=${MD_PATH%.md}.detailed.md
          s5cmd cp $DETAILED_MD_PATH "${{ env.S3_MD_PATH }}/${METRIC_NAME}.detailed.md"

          GPU_MEMORY_SVG_PATH=${MD_PATH%.md}.memory.svg

          echo "S3_MD_PATH=${S3_MD_PATH}" >> $GITHUB_ENV
          echo "DETAILED_MD_PATH=${DETAILED_MD_PATH}" >> $GITHUB_ENV
          echo "GPU_MEMORY_SVG_PATH=${GPU_MEMORY_SVG_PATH}" >> $GITHUB_ENV

      - name: Upload metric artifacts
        id: upload-metric-artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-metric-name.outputs.name }}
          path: |
            ${{ env.METRIC_PATH }}
            ${{ env.DETAILED_MD_PATH }}
            ${{ env.GPU_MEMORY_SVG_PATH }}
          if-no-files-found: warn
          retention-days: 1

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

      ### Update gh-pages
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Set up git
        working-directory: gh-pages
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Commit to gh-pages branch
        working-directory: gh-pages
        run: |
          GH_PAGES_PATH="benchmarks-dispatch/${{ github.head_ref || github.ref }}"
          echo "GH_PAGES_PATH=${GH_PAGES_PATH}" >> $GITHUB_ENV
          mkdir -p ${GH_PAGES_PATH}
          s5cmd cp $S3_MD_PATH "${GH_PAGES_PATH}/${METRIC_NAME}.md"

          git add ${GH_PAGES_PATH}/${METRIC_NAME}.md
          git commit --allow-empty -m "Update benchmark result at ${GH_PAGES_PATH}/${METRIC_NAME}.md"
          MAX_RETRIES=10
          RETRY_DELAY=5
          ATTEMPT=0
          SUCCESS=false
          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
              echo "Attempt $((ATTEMPT + 1)) to push of $MAX_RETRIES..."
              git fetch origin gh-pages
              git merge origin/gh-pages --no-edit
              if git push origin gh-pages; then
                  SUCCESS=true
                  break
              else
                  echo "Push failed. Retrying in $RETRY_DELAY seconds..."
                  sleep $RETRY_DELAY
                  ATTEMPT=$((ATTEMPT + 1))
              fi
          done
          if [ "$SUCCESS" = false ]; then
              echo "PUSH_FAILED"
              exit 1
          fi

      - name: Update summary with results
        working-directory: gh-pages
        run: |
          RESULT_URL="https://github.com/${{ github.repository }}/blob/gh-pages/${GH_PAGES_PATH}/${METRIC_NAME}.md"
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo "[${METRIC_NAME}](${RESULT_URL})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat "${GH_PAGES_PATH}/${METRIC_NAME}.md" >> $GITHUB_STEP_SUMMARY

      - name: Path to result
        working-directory: gh-pages
        run: |
          echo "https://github.com/${{ github.repository }}/blob/gh-pages/${GH_PAGES_PATH}/${METRIC_NAME}.md"
